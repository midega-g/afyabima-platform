# =============================================================================
# AfyaBima — Docker Compose
# =============================================================================
#
# ACTIVE SERVICES
#   postgres    — PostgreSQL 16 (Alpine). Schema applied on first start.
#   generator   — Python data generator. Writes CSVs to shared volume, then exits.
#
# COMMENTED SERVICES (uncomment in order as each layer is ready)
#   Kafka stack     — zookeeper, kafka, schema-registry, kafka-connect, debezium
#   dbt             — after postgres has data
#   airflow         — after dbt marts layer exists
#   fastapi         — after airflow + marts
#
# FIRST RUN
#   1. cp .env.example .env  and fill in all passwords
#   2. docker compose up --build
#
# LOAD CSVs AFTER GENERATOR EXITS
#   docker exec afyabima-postgres bash /sql/load_csv.sh \
#     --data-dir /tmp/afyabima_data --user kafka_connect --db afyabima
#
# FULL RESET (deletes all data)
#   docker compose down -v && docker compose up --build
# =============================================================================

name: afyabima

networks:
  afyabima-net:
    driver: bridge

volumes:
  pgdata:       # PostgreSQL data — survives `down`, deleted by `down -v`
  csvdata:      # Generator CSVs — shared between generator (write) and postgres (read)

services:

  # ---------------------------------------------------------------------------
  # postgres
  # Build context is project root so the Dockerfile can COPY from
  # database_scripts/ without any path gymnastics.
  # ---------------------------------------------------------------------------
  postgres:
    build:
      context: .                            # project root — database_scripts/ is accessible
      dockerfile: docker/postgres/Dockerfile
    image: afyabima-postgres:latest
    container_name: afyabima-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    restart: unless-stopped
    networks:
      - afyabima-net
    ports:
      - "127.0.0.1:5432:5432"               # localhost only — not exposed to the network
    volumes:
      - pgdata:/var/lib/postgresql/data
      - csvdata:/tmp/afyabima_data:ro        # CSVs from generator (read-only for postgres)
      # Mount operational SQL files so they can be re-run without rebuilding
      - ./database_scripts/load_csv.sh:/sql/load_csv.sh:ro
      - ./database_scripts/db_tests.sql:/sql/db_tests.sql:ro
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?et POSTGRES_PASSWORD in .env}
      # Service role passwords — consumed by database_scripts/02_set_passwords.sh
      KAFKA_CONNECT_PASSWORD: ${KAFKA_CONNECT_PASSWORD:?Set KAFKA_CONNECT_PASSWORD in .env}
      DBT_RUNNER_PASSWORD:    ${DBT_RUNNER_PASSWORD:?Set DBT_RUNNER_PASSWORD in .env}
      API_READER_PASSWORD:    ${API_READER_PASSWORD:?Set API_READER_PASSWORD in .env}
      DEBEZIUM_PASSWORD:      ${DEBEZIUM_PASSWORD:?Set DEBEZIUM_PASSWORD in .env}
      AIRFLOW_RUNNER_PASSWORD: ${AIRFLOW_RUNNER_PASSWORD:?Set AIRFLOW_RUNNER_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # generator
  # Build context is project root — pyproject.toml, uv.lock, and
  # data_generation/ are all at the root, directly accessible.
  # Runs once and exits. Load CSVs manually after it finishes.
  # ---------------------------------------------------------------------------
  generator:
    build:
      context: .                            # project root
      dockerfile: docker/generator/Dockerfile
    image: afyabima-generator:latest
    container_name: afyabima-generator
    networks:
      - afyabima-net
    volumes:
      - csvdata:/app/data
    depends_on:
      postgres:
        condition: service_healthy

